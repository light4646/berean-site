<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EDCB7C"/>
      <stop offset=".55" stop-color="#C99A4B"/>
      <stop offset="1" stop-color="#8F5E1E"/>
    </linearGradient>
    <linearGradient id="goldDeep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D2A558"/>
      <stop offset="1" stop-color="#7A4E16"/>
    </linearGradient>
  </defs>

  <!-- spire: stepped art-deco tower -->
  <g fill="url(#gold)">
    <!-- center needle -->
    <polygon points="100,4 94,58 94,124 100,131 106,124 106,58"/>
    <!-- inner shoulders -->
    <polygon points="90,46 80,62 80,118 90,126"/>
    <polygon points="110,46 120,62 120,118 110,126"/>
    <!-- outer shoulders -->
    <polygon points="76,74 66,90 66,110 76,120"/>
    <polygon points="124,74 134,90 134,110 124,120"/>
  </g>

  <!-- open book -->
  <g>
    <!-- upper page spread: sweeping wings with sharp outer tips -->
    <path fill="url(#gold)" d="M97 148
      C 80 140, 52 128, 24 108
      C 26 134, 40 156, 68 162
      C 82 165, 92 160, 98 152 Z"/>
    <path fill="url(#gold)" d="M103 148
      C 120 140, 148 128, 176 108
      C 174 134, 160 156, 132 162
      C 118 165, 108 160, 102 152 Z"/>
    <!-- lower page layer peeking below -->
    <path fill="url(#goldDeep)" d="M97 156
      C 86 165, 70 168, 58 165
      C 38 160, 26 144, 22 120
      C 24 148, 38 166, 62 171
      C 78 174, 92 169, 98 161 Z"/>
    <path fill="url(#goldDeep)" d="M103 156
      C 114 165, 130 168, 142 165
      C 162 160, 174 144, 178 120
      C 176 148, 162 166, 138 171
      C 122 174, 108 169, 102 161 Z"/>
    <!-- spine tail -->
    <path fill="url(#goldDeep)" d="M97 154 C 98 163, 102 163, 103 154 L 103 168 C 101 174, 99 174, 97 168 Z"/>
  </g>
</svg>
